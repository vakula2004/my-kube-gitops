apiVersion: monitoring.coreos.com/v1
kind: PodMonitor # <-- Меняем ServiceMonitor на PodMonitor
metadata:
  name: petclinic-monitor
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: petclinic # Ищет сам под приложения
  podMetricsEndpoints:
  - targetPort: 8080 # <-- Подключаемся НАПРЯМУЮ к порту Java 8080 внутри контейнера
    path: /actuator/prometheus
    interval: 15s
